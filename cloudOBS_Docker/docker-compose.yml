version: "3.8"

services:
  obs-studio:
    image: lscr.io/linuxserver/webtop:debian-xfce
    container_name: obs-studio
    shm_size: "4gb" # Required for OBS Studio and desktop environments to not crash
    entrypoint:
      - /bin/bash
      - -c
      - |
        # Ensure the default user can run sudo without a password
        mkdir -p /etc/sudoers.d
        echo "ALL ALL=(ALL) NOPASSWD: ALL" > /etc/sudoers.d/abc
        chmod 440 /etc/sudoers.d/abc

        # Create the visible installation script in a safe system folder
        cat << 'EOF' > /usr/local/bin/install-obs.sh
        #!/bin/bash

        if ! command -v obs >/dev/null 2>&1; then
            echo -e "\e[1;32m=====================================================================\e[0m"
            echo -e "\e[1;32m WELCOME TO CLOUD OBS!\e[0m"
            echo -e "\e[1;32m We are installing OBS Studio and building the PyleIRL Plugin now.\e[0m"
            echo -e "\e[1;32m Please wait 3-5 minutes. Do not close this window.\e[0m"
            echo -e "\e[1;32m=====================================================================\e[0m"
            echo ""
            
            sudo apt-get update
            sudo apt-get install -y --no-install-recommends obs-studio wget xz-utils ca-certificates curl jq libqt6svg6
            
            echo -e "\n\e[1;34m--> Downloading Prebuilt PyleIRL Plugin...\e[0m"
            mkdir -p /tmp/pyleirl
            
            # Fetch the download URL of the latest release bypassing API rate limits
            TAG=$$(curl -sI https://github.com/pyledw/PyleIRL/releases/latest | grep -i '^location:' | sed 's/.*\///' | tr -d '\r' | tr -d '\n')
            DOWNLOAD_URL="https://github.com/pyledw/PyleIRL/releases/download/$${TAG}/PyleIRL-$${TAG}-x86_64-ubuntu-gnu.tar.xz"
            
            echo -e "\e[1;33m[DEBUG] Parsed TAG: '$$TAG'\e[0m"
            echo -e "\e[1;33m[DEBUG] DOWNLOAD_URL: '$$DOWNLOAD_URL'\e[0m"
            
            if [ -n "$$DOWNLOAD_URL" ] && [ "$$DOWNLOAD_URL" != "null" ]; then
                echo -e "\e[1;33m[DEBUG] Running wget...\e[0m"
                wget -O /tmp/pyleirl/plugin.tar.xz "$$DOWNLOAD_URL"
                echo -e "\e[1;33m[DEBUG] wget exit code: $$?\e[0m"
            fi
            
            echo -e "\e[1;33m[DEBUG] Checking downloaded file:\e[0m"
            ls -lh /tmp/pyleirl/plugin.tar.xz || echo -e "\e[1;31m[DEBUG] File not found!\e[0m"
            
            if [ -s "/tmp/pyleirl/plugin.tar.xz" ]; then
                tar -xf /tmp/pyleirl/plugin.tar.xz -C /tmp/pyleirl/
                
                mkdir -p /config/.config/obs-studio/plugins/PyleIRL/bin/64bit
                mkdir -p /config/.config/obs-studio/plugins/PyleIRL/data
                
                find /tmp/pyleirl -name "*.so" -exec cp {} /config/.config/obs-studio/plugins/PyleIRL/bin/64bit/ \;
                
                # Copy translation/data files if they exist in the extracted folder
                if [ -d "/tmp/pyleirl/share/obs/obs-plugins/PyleIRL" ]; then
                    cp -r /tmp/pyleirl/share/obs/obs-plugins/PyleIRL/* /config/.config/obs-studio/plugins/PyleIRL/data/ 2>/dev/null || true
                elif [ -d "/tmp/pyleirl/data" ]; then
                    cp -r /tmp/pyleirl/data/* /config/.config/obs-studio/plugins/PyleIRL/data/ 2>/dev/null || true
                fi
                
                echo -e "\n\e[1;32m=====================================================================\e[0m"
                echo -e "\e[1;32m INSTALLATION COMPLETE! Launching OBS Studio...\e[0m"
                echo -e "\e[1;32m=====================================================================\e[0m"
                sleep 3
            else
                echo -e "\n\e[1;31m=====================================================================\e[0m"
                echo -e "\e[1;31m ERROR: Failed to download plugin release! Check URL.\e[0m"
                echo -e "\e[1;31m=====================================================================\e[0m"
                sleep 15
            fi
            
            rm -rf /tmp/pyleirl
        fi

        # Ensure our custom scenes are injected on every boot so they are always available
        mkdir -p /config/.config/obs-studio/basic/scenes/
        cp /default_scenes.json "/config/.config/obs-studio/basic/scenes/Default PyleIRL.json" 2>/dev/null || true
        chown -R abc:abc /config/.config/obs-studio/basic/scenes/

        # If this is a completely fresh install (no global.ini), force OBS to load Default PyleIRL by default
        if [ ! -f "/config/.config/obs-studio/global.ini" ]; then
            echo "[Basic]" > /config/.config/obs-studio/global.ini
            echo "SceneCollection=Default PyleIRL" >> /config/.config/obs-studio/global.ini
            echo "SceneCollectionFile=Default PyleIRL" >> /config/.config/obs-studio/global.ini
            chown abc:abc /config/.config/obs-studio/global.ini
        fi

        # Force the desktop resolution to 1080p so OBS natively defaults to a 1080p canvas
        xrandr -s 1920x1080 >/dev/null 2>&1 || true

        # Ensure desktop shortcut exists for future clicks
        mkdir -p /config/Desktop
        cat << 'SHORTCUT' > /config/Desktop/obs-studio.desktop
        [Desktop Entry]
        Type=Application
        Exec=obs
        Icon=obs
        Name=OBS Studio
        Terminal=false
        SHORTCUT
        chmod +x /config/Desktop/obs-studio.desktop

        # Launch OBS Studio
        obs
        EOF
        chmod +x /usr/local/bin/install-obs.sh

        # Create an XFCE autostart entry so the terminal automatically pops up on boot
        mkdir -p /config/.config/autostart /config/Desktop
        cat << 'EOF' > /config/.config/autostart/obs-installer.desktop
        [Desktop Entry]
        Type=Application
        Exec=xfce4-terminal --command="bash -c '/usr/local/bin/install-obs.sh; exec bash'"
        Hidden=false
        Name=OBS Installer
        X-GNOME-Autostart-enabled=true
        EOF

        # Create a Desktop shortcut for manual rebuilds
        cat << 'EOF' > /config/Desktop/rebuild-plugin.desktop
        [Desktop Entry]
        Type=Application
        Exec=xfce4-terminal --command="bash -c '/usr/local/bin/install-obs.sh; exec bash'"
        Icon=utilities-terminal
        Name=Rebuild PyleIRL Plugin
        Terminal=false
        EOF
        chmod +x /config/Desktop/rebuild-plugin.desktop

        # CRITICAL FIX: The previous script ran 'chown abc:abc' before 'abc' existed, 
        # leaving /config owned by root and completely crashing XFCE! 
        # Using numerical ID 1000 guarantees perfect permissions.
        chown -R 1000:1000 /config

        # Start the desktop natively
        exec /init
    security_opt:
      - seccomp:unconfined
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/New_York
      - LIBGL_ALWAYS_SOFTWARE=1 # Required since Hyper-V VM has no GPU
      - CUSTOM_PORT=3005
      - CUSTOM_HTTPS_PORT=3006

    volumes:
      - ./config_debian:/config
      - ./default_scenes.json:/default_scenes.json:ro
    network_mode: host
    restart: unless-stopped
