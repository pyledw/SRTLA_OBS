version: "3.8"

services:
    obs-studio-ubuntu:
        image: lscr.io/linuxserver/webtop:ubuntu-xfce
        container_name: obs-studio-ubuntu
        shm_size: "4gb" # Reduced to 1GB because host has very low free RAM (1GB left) causing tmpfs ENOSPC
        entrypoint:
            - /bin/bash
            - -c
            - |
              # Ensure the default user can run sudo without a password
              mkdir -p /etc/sudoers.d
              echo "ALL ALL=(ALL) NOPASSWD: ALL" > /etc/sudoers.d/abc
              chmod 440 /etc/sudoers.d/abc

              # Create the visible installation script in a safe system folder
              cat << 'EOF' > /usr/local/bin/install-obs.sh
              #!/bin/bash

              # Setup detailed log file and status helper functions
              LOG_FILE="/config/Desktop/install.log"
              mkdir -p /config/Desktop
              echo "=== Installation Started $$(date) ===" > "$$LOG_FILE"

              run_step() {
                  local step_name="$$1"
                  local cmd="$$2"
                  
                  echo -ne "\e[1;33m[ ] $$step_name...\e[0m"
                  echo -e "\n--- START STEP: $$step_name ---" >> "$$LOG_FILE"
                  if eval "$$cmd" >> "$$LOG_FILE" 2>&1; then
                      echo -e "\r\e[1;32m[OK]\e[0m $$step_name"
                      echo -e "--- STEP SUCCESS ---\n" >> "$$LOG_FILE"
                      return 0
                  else
                      echo -e "\r\e[1;31m[FAIL]\e[0m $$step_name"
                      echo -e "--- STEP FAILED ---\n" >> "$$LOG_FILE"
                      echo -e "\e[1;31mERROR details for '$$step_name':\e[0m"
                      tail -n 20 "$$LOG_FILE" | sed 's/^/  /'
                      echo ""
                      return 1
                  fi
              }

              run_step_optional() {
                  local step_name="$$1"
                  local cmd="$$2"
                  
                  echo -ne "\e[1;33m[ ] $$step_name (Optional)...\e[0m"
                  echo -e "\n--- START OPTIONAL STEP: $$step_name ---" >> "$$LOG_FILE"
                  if eval "$$cmd" >> "$$LOG_FILE" 2>&1; then
                      echo -e "\r\e[1;32m[OK]\e[0m $$step_name"
                      echo -e "--- STEP SUCCESS ---\n" >> "$$LOG_FILE"
                      return 0
                  else
                      echo -e "\r\e[1;33m[SKIP]\e[0m $$step_name"
                      echo -e "--- STEP FAILED (OPTIONAL) ---\n" >> "$$LOG_FILE"
                      return 0
                  fi
              }

              echo -e "\e[1;32m=====================================================================\e[0m"
              echo -e "\e[1;32m WELCOME TO CLOUD OBS (UBUNTU EDITION)!\e[0m"
              echo -e "\e[1;32m Installing OBS Studio, Plugins, and Tools...\e[0m"
              echo -e "\e[1;32m Detailed log available at: /config/Desktop/install.log\e[0m"
              echo -e "\e[1;32m=====================================================================\e[0m"
              echo ""

              if ! command -v obs >/dev/null 2>&1; then
                  run_step "Updating package sources and adding OBS PPA" "sudo apt-get update -qq && sudo apt-get install -y -qq --no-install-recommends software-properties-common && sudo add-apt-repository -y ppa:obsproject/obs-studio"
                  run_step "Installing OBS Studio and dependencies" "sudo apt-get install -y -qq --no-install-recommends obs-studio wget xz-utils ca-certificates curl jq adwaita-icon-theme python3"
                  run_step_optional "Installing Qt visual compatibility packages" "sudo apt-get install -y -qq --no-install-recommends libqt5svg5 qt5-image-formats-plugins libqt6svg6 qt6-svg-plugins libqt6quickvectorimage6"
                  
                  # Write small Python helper to avoid escaping inside double-quotes
                  printf '%s\n' \
                      'import os, re' \
                      'for r, d, files in os.walk("/usr/share/obs/obs-studio/themes"):' \
                      '    for f in files:' \
                      '        if f.endswith(".qss"):' \
                      '            path = os.path.join(r, f)' \
                      '            try:' \
                      '                with open(path, "r", encoding="utf-8") as file:' \
                      '                    text = file.read()' \
                      '                new_text = re.sub(r"(QCheckBox|QRadioButton)::[a-zA-Z0-9_-]+(:[a-zA-Z0-9_-]+)*\s*\{[^}]*\}", "", text)' \
                      '                with open(path, "w", encoding="utf-8") as file:' \
                      '                    file.write(new_text)' \
                      '            except Exception:' \
                      '                pass' > /tmp/fix-themes.py
                  run_step "Fixing OBS theme rendering styles" "python3 /tmp/fix-themes.py && rm -f /tmp/fix-themes.py"
              fi
                  
              # Fetch the download URL of the latest release bypassing API rate limits
              TAG=$$(curl -sI https://github.com/pyledw/PyleIRL/releases/latest | grep -i '^location:' | sed 's/.*\///' | tr -d '\r' | tr -d '\n')
              if [ -z "$$TAG" ] || [ "$$TAG" = "latest" ] || [ "$$TAG" = "null" ]; then
                  TAG=$$(curl -s https://api.github.com/repos/pyledw/PyleIRL/releases/latest | jq -r .tag_name 2>/dev/null)
              fi
              if [ -z "$$TAG" ] || [ "$$TAG" = "null" ]; then
                  TAG="3.2.0"
              fi

              DOWNLOAD_PATH=$$(curl -sL https://github.com/pyledw/PyleIRL/releases/expanded_assets/$$TAG | grep -o 'href="[^"]*ubuntu[^"]*\.tar\.xz"' | head -n 1 | cut -d '"' -f 2)
              if [ -n "$$DOWNLOAD_PATH" ] && [ "$$DOWNLOAD_PATH" != "https://github.com" ]; then
                  DOWNLOAD_URL="https://github.com$$DOWNLOAD_PATH"
              else
                  DOWNLOAD_URL="https://github.com/pyledw/PyleIRL/releases/download/$${TAG}/PyleIRL-$${TAG}-ubuntu-x64.tar.xz"
              fi

              # Write PyleIRL config helper script
              printf '%s\n' \
                  'import os, re' \
                  'ini_path = "/config/.config/obs-studio/global.ini"' \
                  'os.makedirs(os.path.dirname(ini_path), exist_ok=True)' \
                  'text = ""' \
                  'if os.path.exists(ini_path):' \
                  '    with open(ini_path, "r", encoding="utf-8") as f:' \
                  '        text = f.read()' \
                  'text = re.sub(r"\[OBSWebSocket\].*?(?=\n\[|$)", "", text, flags=re.DOTALL)' \
                  'text = text.strip() + "\n\n[OBSWebSocket]\nServerEnabled=true\nServerPort=4455\nServerPassword=Abc123@@\n"' \
                  'with open(ini_path, "w", encoding="utf-8") as f:' \
                  '    f.write(text)' > /tmp/setup-obs-websocket.py

              run_step "Installing PyleIRL plugin ($$TAG)" '
                  killall -9 obs 2>/dev/null || true
                  python3 /tmp/setup-obs-websocket.py && rm -f /tmp/setup-obs-websocket.py
                  rm -rf /config/.config/obs-studio/plugins/PyleIRL/
                  mkdir -p /tmp/pyleirl
                  wget -q -O /tmp/pyleirl/plugin.tar.xz "$$DOWNLOAD_URL"
                  tar -xf /tmp/pyleirl/plugin.tar.xz -C /tmp/pyleirl/
                  mkdir -p /config/.config/obs-studio/plugins/PyleIRL/bin/64bit
                  mkdir -p /config/.config/obs-studio/plugins/PyleIRL/data
                  find /tmp/pyleirl -name "*.so" -exec cp -f {} /config/.config/obs-studio/plugins/PyleIRL/bin/64bit/ \;
                  if [ -d "/tmp/pyleirl/share/obs/obs-plugins/PyleIRL" ]; then
                      cp -r /tmp/pyleirl/share/obs/obs-plugins/PyleIRL/* /config/.config/obs-studio/plugins/PyleIRL/data/ 2>/dev/null || true
                  elif [ -d "/tmp/pyleirl/data" ]; then
                      cp -r /tmp/pyleirl/data/* /config/.config/obs-studio/plugins/PyleIRL/data/ 2>/dev/null || true
                  fi
                  rm -rf /tmp/pyleirl
              '

              run_step "Installing obs-advanced-masks plugin" '
                  MASK_TAG=$$(curl -sI https://github.com/FiniteSingularity/obs-advanced-masks/releases/latest | grep -i "^location:" | sed "s/.*\///" | tr -d "\r" | tr -d "\n")
                  MASK_PATH=$$(curl -sL https://github.com/FiniteSingularity/obs-advanced-masks/releases/expanded_assets/$$MASK_TAG | grep -o "href=\"[^\"]*ubuntu[^\"]*\.zip\"" | head -n 1 | cut -d "\"" -f 2)
                  MASK_URL="https://github.com$$MASK_PATH"
                  rm -rf /config/.config/obs-studio/plugins/obs-advanced-masks/
                  mkdir -p /tmp/advanced-masks
                  wget -q -O /tmp/advanced-masks/plugin.zip "$$MASK_URL"
                  python3 -m zipfile -e /tmp/advanced-masks/plugin.zip /tmp/advanced-masks/
                  MASK_TAR=$$(ls /tmp/advanced-masks/*.tar.gz 2>/dev/null | head -n 1)
                  tar -xf "$$MASK_TAR" -C /tmp/advanced-masks/
                  mkdir -p /config/.config/obs-studio/plugins/obs-advanced-masks/bin/64bit
                  mkdir -p /config/.config/obs-studio/plugins/obs-advanced-masks/data
                  cp -f /tmp/advanced-masks/obs-advanced-masks/bin/64bit/*.so /config/.config/obs-studio/plugins/obs-advanced-masks/bin/64bit/ 2>/dev/null || true
                  cp -r /tmp/advanced-masks/obs-advanced-masks/data/* /config/.config/obs-studio/plugins/obs-advanced-masks/data/ 2>/dev/null || true
                  rm -rf /tmp/advanced-masks
              '

              run_step "Installing obs-shaderfilter plugin" '
                  SHADER_TAG=$$(curl -sI https://github.com/exeldro/obs-shaderfilter/releases/latest | grep -i "^location:" | sed "s/.*\///" | tr -d "\r" | tr -d "\n")
                  SHADER_DOWNLOAD_URL="https://github.com/exeldro/obs-shaderfilter/releases/download/$${SHADER_TAG}/obs-shaderfilter-$${SHADER_TAG}-ubuntu-22.04.tar.gz"
                  rm -rf /config/.config/obs-studio/plugins/obs-shaderfilter/
                  mkdir -p /tmp/shaderfilter
                  wget -q -O /tmp/shaderfilter/plugin.tar.gz "$$SHADER_DOWNLOAD_URL"
                  tar -xf /tmp/shaderfilter/plugin.tar.gz -C /tmp/shaderfilter/
                  mkdir -p /config/.config/obs-studio/plugins/obs-shaderfilter/bin/64bit
                  mkdir -p /config/.config/obs-studio/plugins/obs-shaderfilter/data
                  cp -f /tmp/shaderfilter/obs-shaderfilter/bin/64bit/*.so /config/.config/obs-studio/plugins/obs-shaderfilter/bin/64bit/ 2>/dev/null || true
                  cp -r /tmp/shaderfilter/obs-shaderfilter/data/* /config/.config/obs-studio/plugins/obs-shaderfilter/data/ 2>/dev/null || true
                  rm -rf /tmp/shaderfilter
              '

              run_step_optional "Installing Aitum Stream Suite (Optional)" '
                  AITUM_TAG=$$(curl -sI https://github.com/Aitum/obs-aitum-stream-suite/releases/latest | grep -i "^location:" | sed "s/.*\///" | tr -d "\r" | tr -d "\n")
                  AITUM_URL="https://github.com/Aitum/obs-aitum-stream-suite/releases/download/$${AITUM_TAG}/aitum-stream-suite-linux-gnu.deb"
                  wget -q -O /tmp/aitum-plugin.deb "$$AITUM_URL"
                  mkdir -p /tmp/aitum_extract
                  dpkg-deb -x /tmp/aitum-plugin.deb /tmp/aitum_extract
                  mkdir -p /config/.config/obs-studio/plugins-disabled/aitum-stream-suite/bin/64bit
                  mkdir -p /config/.config/obs-studio/plugins-disabled/aitum-stream-suite/data
                  find /tmp/aitum_extract -name "*.so" -exec cp -f {} /config/.config/obs-studio/plugins-disabled/aitum-stream-suite/bin/64bit/ \;
                  if [ -d "/tmp/aitum_extract/usr/share/obs/obs-plugins/aitum-stream-suite" ]; then
                      cp -r /tmp/aitum_extract/usr/share/obs/obs-plugins/aitum-stream-suite/* /config/.config/obs-studio/plugins-disabled/aitum-stream-suite/data/ 2>/dev/null || true
                  elif [ -d "/tmp/aitum_extract/usr/lib/obs-plugins/aitum-stream-suite/data" ]; then
                      cp -r /tmp/aitum_extract/usr/lib/obs-plugins/aitum-stream-suite/data/* /config/.config/obs-studio/plugins-disabled/aitum-stream-suite/data/ 2>/dev/null || true
                  fi
                  rm -rf /tmp/aitum-plugin.deb /tmp/aitum_extract
              '

              run_step "Installing Social Stream Ninja Desktop" '
                  SSN_TAG=$$(curl -sI https://github.com/steveseguin/social_stream/releases/latest | grep -i "^location:" | sed "s/.*\///" | tr -d "\r" | tr -d "\n")
                  SSN_PATH=$$(curl -sL https://github.com/steveseguin/social_stream/releases/expanded_assets/$$SSN_TAG | grep -o "href=\"[^\"]*\.AppImage\"" | head -n 1 | cut -d "\"" -f 2)
                  SSN_URL="https://github.com$$SSN_PATH"
                  mkdir -p /config/SSN_App
                  wget -q -O /config/SSN_App/ssn.AppImage "$$SSN_URL"
                  chmod +x /config/SSN_App/ssn.AppImage
                  cd /config/SSN_App
                  ./ssn.AppImage --appimage-extract >/dev/null 2>&1
                  mkdir -p /config/Desktop
                  echo "[Desktop Entry]" > /config/Desktop/social-stream-ninja.desktop
                  echo "Type=Application" >> /config/Desktop/social-stream-ninja.desktop
                  echo "Exec=/config/SSN_App/squashfs-root/AppRun" >> /config/Desktop/social-stream-ninja.desktop
                  echo "Name=Social Stream Ninja" >> /config/Desktop/social-stream-ninja.desktop
                  echo "Terminal=false" >> /config/Desktop/social-stream-ninja.desktop
                  echo "Categories=Network;" >> /config/Desktop/social-stream-ninja.desktop
                  chmod +x /config/Desktop/social-stream-ninja.desktop
                  mkdir -p /config/.config/autostart
                  for name in social-stream-ninja.desktop social-stream.desktop social_stream.desktop appimagekit-social-stream.desktop appimagekit-social-stream-ninja.desktop; do
                      rm -f "/config/.config/autostart/$$name"
                      mkdir -p "/config/.config/autostart/$$name"
                  done
              '

              # Generate and force PyleDefault Profile and Scene Collection
              cat << 'PYLE_DEFAULT' > /config/setup-pyle-defaults.py
              import os, json, configparser
              OBS_CONFIG_DIR = '/config/.config/obs-studio'
              PROFILES_DIR = os.path.join(OBS_CONFIG_DIR, 'basic', 'profiles', 'PyleDefault')
              SCENES_DIR = os.path.join(OBS_CONFIG_DIR, 'basic', 'scenes')
              os.makedirs(PROFILES_DIR, exist_ok=True)
              os.makedirs(SCENES_DIR, exist_ok=True)
              basic_ini_content = """[General]
              Name=PyleDefault

              [Video]
              BaseCX=1920
              BaseCY=1080
              OutputCX=1920
              OutputCY=1080
              FPSCommon=60

              [SimpleOutput]
              VBitrate=4500
              StreamEncoder=x264
              Preset=fast

              [SRTLA_AutoSwitch]
              Enabled=true
              VisEnabled=true
              RulesJSON=[{"minKbps":0,"maxKbps":800,"targetScene":"Connection Failed"}]
              VisibilityRulesJSON=[{"minKbps":800,"maxKbps":1500,"sourceName":"Low Signal Strength"}]

              [SRTLA_WebInterface]
              Enabled=true
              Port=5433
              """
              with open(os.path.join(PROFILES_DIR, 'basic.ini'), 'w') as f:
                  f.write(basic_ini_content)
              scene_json = {'current_program_scene': 'Live', 'current_scene': 'Live', 'current_transition': 'Fade', 'groups': [], 'modules': {}, 'name': 'PyleDefault', 'quick_transitions': [], 'saved_projectors': [], 'scene_order': [{'name': 'Live'}, {'name': 'Connection Failed'}], 'sources': [{'balance': 0.5, 'deinterlace_field_order': 0, 'deinterlace_mode': 0, 'enabled': True, 'flags': 0, 'hotkeys': {}, 'id': 'scene', 'mixers': 0, 'monitoring_type': 0, 'muted': False, 'name': 'Live', 'prev_ver': 503316480, 'private_settings': {}, 'push-to-mute': False, 'push-to-mute-delay': 0, 'push-to-talk': False, 'push-to-talk-delay': 0, 'settings': {'custom_size': False, 'id_counter': 3, 'items': [{'align': 5, 'bounds': {'x': 1920.0, 'y': 1080.0}, 'bounds_align': 0, 'bounds_type': 2, 'crop_bottom': 0, 'crop_left': 0, 'crop_right': 0, 'crop_top': 0, 'group_item_backup': False, 'id': 1, 'name': 'SRTLA Camera', 'pos': {'x': 0.0, 'y': 0.0}, 'private_settings': {}, 'rot': 0.0, 'scale': {'x': 1.0, 'y': 1.0}, 'scale_filter': 'disable', 'visible': True}, {'align': 5, 'bounds': {'x': 1920.0, 'y': 100.0}, 'bounds_align': 0, 'bounds_type': 2, 'crop_bottom': 0, 'crop_left': 0, 'crop_right': 0, 'crop_top': 0, 'group_item_backup': False, 'id': 2, 'name': 'Low Signal Strength', 'pos': {'x': 0.0, 'y': 950.0}, 'private_settings': {}, 'rot': 0.0, 'scale': {'x': 1.0, 'y': 1.0}, 'scale_filter': 'disable', 'visible': True}, {'align': 5, 'bounds': {'x': 0.0, 'y': 0.0}, 'bounds_align': 0, 'bounds_type': 0, 'crop_bottom': 0, 'crop_left': 0, 'crop_right': 0, 'crop_top': 0, 'group_item_backup': False, 'id': 3, 'name': 'SRTLA Bitrate', 'pos': {'x': 20.0, 'y': 1000.0}, 'private_settings': {}, 'rot': 0.0, 'scale': {'x': 1.0, 'y': 1.0}, 'scale_filter': 'disable', 'visible': True}]}, 'sync': 0, 'versioned_id': 'scene', 'volume': 1.0}, {'balance': 0.5, 'deinterlace_field_order': 0, 'deinterlace_mode': 0, 'enabled': True, 'flags': 0, 'hotkeys': {}, 'id': 'scene', 'mixers': 0, 'monitoring_type': 0, 'muted': False, 'name': 'Connection Failed', 'prev_ver': 503316480, 'private_settings': {}, 'push-to-mute': False, 'push-to-mute-delay': 0, 'push-to-talk': False, 'push-to-talk-delay': 0, 'settings': {'custom_size': False, 'id_counter': 1, 'items': [{'align': 5, 'bounds': {'x': 1920.0, 'y': 1080.0}, 'bounds_align': 0, 'bounds_type': 2, 'crop_bottom': 0, 'crop_left': 0, 'crop_right': 0, 'crop_top': 0, 'group_item_backup': False, 'id': 1, 'name': 'Connection Failed Text', 'pos': {'x': 0.0, 'y': 0.0}, 'private_settings': {}, 'rot': 0.0, 'scale': {'x': 1.0, 'y': 1.0}, 'scale_filter': 'disable', 'visible': True}]}, 'sync': 0, 'versioned_id': 'scene', 'volume': 1.0}, {'balance': 0.5, 'deinterlace_field_order': 0, 'deinterlace_mode': 0, 'enabled': True, 'flags': 0, 'hotkeys': {}, 'id': 'srtla_source', 'mixers': 255, 'monitoring_type': 0, 'muted': False, 'name': 'SRTLA Camera', 'prev_ver': 503316480, 'private_settings': {}, 'push-to-mute': False, 'push-to-mute-delay': 0, 'push-to-talk': False, 'push-to-talk-delay': 0, 'settings': {'listen_port': 5050}, 'sync': 0, 'versioned_id': 'srtla_source', 'volume': 1.0}, {'balance': 0.5, 'deinterlace_field_order': 0, 'deinterlace_mode': 0, 'enabled': True, 'flags': 0, 'hotkeys': {}, 'id': 'text_ft2_source_v2', 'mixers': 255, 'monitoring_type': 0, 'muted': False, 'name': 'Low Signal Strength', 'prev_ver': 503316480, 'private_settings': {}, 'push-to-mute': False, 'push-to-mute-delay': 0, 'push-to-talk': False, 'push-to-talk-delay': 0, 'settings': {'color1': 4278190335, 'text': 'Low Signal Strength', 'font': {'face': 'Arial', 'size': 128, 'style': 'Bold'}}, 'sync': 0, 'versioned_id': 'text_ft2_source_v2', 'volume': 1.0}, {'balance': 0.5, 'deinterlace_field_order': 0, 'deinterlace_mode': 0, 'enabled': True, 'flags': 0, 'hotkeys': {}, 'id': 'text_ft2_source_v2', 'mixers': 255, 'monitoring_type': 0, 'muted': False, 'name': 'Connection Failed Text', 'prev_ver': 503316480, 'private_settings': {}, 'push-to-mute': False, 'push-to-mute-delay': 0, 'push-to-talk': False, 'push-to-talk-delay': 0, 'settings': {'color1': 4278190335, 'text': 'Connection Failed', 'font': {'face': 'Arial', 'size': 256, 'style': 'Bold'}}, 'sync': 0, 'versioned_id': 'text_ft2_source_v2', 'volume': 1.0}, {'balance': 0.5, 'deinterlace_field_order': 0, 'deinterlace_mode': 0, 'enabled': True, 'flags': 0, 'filters': [{'balance': 0.5, 'deinterlace_field_order': 0, 'deinterlace_mode': 0, 'enabled': True, 'flags': 0, 'hotkeys': {}, 'id': 'srtla_stats_filter', 'mixers': 0, 'monitoring_type': 0, 'muted': False, 'name': 'SRTLA Bitrate Monitor', 'prev_ver': 503382019, 'private_settings': {}, 'push-to-mute': False, 'push-to-mute-delay': 0, 'push-to-talk': False, 'push-to-talk-delay': 0, 'settings': {'listen_port': '5050'}, 'sync': 0, 'versioned_id': 'srtla_stats_filter', 'volume': 1.0}], 'hotkeys': {}, 'id': 'text_ft2_source_v2', 'mixers': 255, 'monitoring_type': 0, 'muted': False, 'name': 'SRTLA Bitrate', 'prev_ver': 503382019, 'private_settings': {}, 'push-to-mute': False, 'push-to-mute-delay': 0, 'push-to-talk': False, 'push-to-talk-delay': 0, 'settings': {'color1': 4294967295, 'text': '0.0 KBPS', 'font': {'face': 'Arial', 'size': 48, 'style': 'Bold'}}, 'sync': 0, 'versioned_id': 'text_ft2_source_v2', 'volume': 1.0}]}
              with open(os.path.join(SCENES_DIR, 'PyleDefault.json'), 'w') as f:
                  json.dump(scene_json, f)
              global_ini_path = os.path.join(OBS_CONFIG_DIR, 'global.ini')
              config = configparser.ConfigParser(strict=False)
              config.optionxform = str
              if os.path.exists(global_ini_path):
                  config.read(global_ini_path)

              if not config.has_section('General'):
                  config.add_section('General')
              config.set('General', 'LicenseAccepted', 'true')
              config.set('General', 'LastVersion', '31.1.1')
              config.set('General', 'AutoConfigWizardRun', 'true')
              config.set('General', 'FirstRun', 'false')

              if not config.has_section('BasicWindow'):
                  config.add_section('BasicWindow')
                  
              current_profile = config.get('BasicWindow', 'ProfileDir', fallback=None)
              if not current_profile or current_profile == 'Untitled':
                  config.set('BasicWindow', 'Profile', 'PyleDefault')
                  config.set('BasicWindow', 'ProfileDir', 'PyleDefault')
                  
              current_scene = config.get('BasicWindow', 'SceneCollection', fallback=None)
              if not current_scene or current_scene == 'Untitled':
                  config.set('BasicWindow', 'SceneCollection', 'PyleDefault')
                  config.set('BasicWindow', 'SceneCollectionFile', 'PyleDefault')
                  
              with open(global_ini_path, 'w') as f:
                  config.write(f, space_around_delimiters=False)
                  
              import shutil
              untitled_profile = os.path.join(OBS_CONFIG_DIR, 'basic', 'profiles', 'Untitled')
              untitled_scene = os.path.join(OBS_CONFIG_DIR, 'basic', 'scenes', 'Untitled.json')
              if os.path.exists(untitled_profile):
                  shutil.rmtree(untitled_profile)
              if os.path.exists(untitled_scene):
                  os.remove(untitled_scene)
              PYLE_DEFAULT

              run_step "Generating PyleDefault Profile and Scene Collection" '
                  sed -i "s/^              //" /config/setup-pyle-defaults.py
                  python3 /config/setup-pyle-defaults.py
                  chown -R abc:abc /config/.config/obs-studio/
              '

              # Force the desktop resolution to 1080p so OBS natively defaults to a 1080p canvas
              xrandr -s 1920x1080 >/dev/null 2>&1 || true

              # Ensure desktop shortcut exists for future clicks
              mkdir -p /config/Desktop
              cat << 'SHORTCUT' > /config/Desktop/obs-studio.desktop
              [Desktop Entry]
              Type=Application
              Exec=obs
              Icon=obs
              Name=OBS Studio
              Terminal=false
              SHORTCUT
              chmod +x /config/Desktop/obs-studio.desktop

              # Launch OBS Studio untethered from this script
              echo -e "\n\e[1;32m=====================================================================\e[0m"
              echo -e "\e[1;32m INSTALLATION COMPLETE! Launching OBS Studio...\e[0m"
              echo -e "\e[1;32m=====================================================================\e[0m"
              sleep 3
              
              nohup obs > /config/obs-startup.log 2>&1 &
              EOF
              chmod +x /usr/local/bin/install-obs.sh

              # Create an XFCE autostart entry so the terminal automatically pops up on boot
              mkdir -p /config/.config/autostart /config/Desktop /config/.config/xfce4/xfconf/xfce-perchannel-xml/
              cat << 'EOF' > /config/.config/autostart/obs-installer.desktop
              [Desktop Entry]
              Type=Application
              Exec=xfce4-terminal --command="bash -c '/usr/local/bin/install-obs.sh; exec bash'"
              Hidden=false
              Name=OBS Installer
              X-GNOME-Autostart-enabled=true
              EOF

              # Create a Desktop shortcut for manual rebuilds
              cat << 'EOF' > /config/Desktop/rebuild-plugin.desktop
              [Desktop Entry]
              Type=Application
              Exec=xfce4-terminal --command="bash -c '/usr/local/bin/install-obs.sh; exec bash'"
              Icon=utilities-terminal
              Name=Rebuild PyleIRL Plugin
              Terminal=false
              EOF
              chmod +x /config/Desktop/rebuild-plugin.desktop
              # CRITICAL FIX: The previous script ran 'chown abc:abc' before 'abc' existed, 
              # leaving /config owned by root and completely crashing XFCE! 
              # Using numerical ID 1000 guarantees perfect permissions.
              chown -R 1000:1000 /config

              # CRITICAL FIX: DBUS in Docker cannot launch systemd services and will crash xfce4-session.
              # We must mask these services by removing their dbus activation files.
              rm -f /usr/share/dbus-1/system-services/org.freedesktop.login1.service
              rm -f /usr/share/dbus-1/system-services/org.freedesktop.PackageKit.service

              # CRITICAL FIX 2: OBS dependencies install 'dbus-user-session' which requires systemd and completely breaks XFCE.
              # We must forcibly remove it and restore dbus-x11 so the desktop can launch!
              apt-get remove -y dbus-user-session >/dev/null 2>&1 || true
              apt-get install -y dbus-x11 >/dev/null 2>&1 || true

              # CRITICAL FIX 3: Ubuntu 24.04 GTK strictly requires glycin-loaders for icons, but its bwrap sandbox crashes in Docker!
              # We must restore glycin-loaders, and replace 'bwrap' with a wrapper that runs glycin natively without sandboxing.
              apt-get install -y --reinstall glycin-loaders >/dev/null 2>&1 || true
              mv /usr/bin/bwrap /usr/bin/bwrap.real || true
              cat << 'BWRAP_EOF' > /usr/bin/bwrap
              #!/bin/bash
              exec_found=0
              cmd=()
              while [[ $$# -gt 0 ]]; do
                  if [[ "$$1" == /usr/libexec/glycin-loaders/* ]]; then
                      exec_found=1
                  fi
                  if [[ $$exec_found -eq 1 ]]; then
                      cmd+=("$$1")
                  fi
                  shift
              done
              if [[ $$exec_found -eq 1 ]]; then
                  exec "$${cmd[@]}"
              else
                  exec /usr/bin/bwrap.real "$$@"
              fi
              BWRAP_EOF
              chmod +x /usr/bin/bwrap

              # CRITICAL FIX 6: Wrapper Chromium/Chrome to run with --no-sandbox automatically inside Docker
              for browser in chromium chromium-browser google-chrome; do
                  if command -v $$browser >/dev/null 2>&1; then
                      REAL_PATH=$$(readlink -f $$(command -v $$browser))
                      if [ -f "$$REAL_PATH" ] && [ ! -f "$${REAL_PATH}.real" ]; then
                          mv "$$REAL_PATH" "$${REAL_PATH}.real"
                           echo '#!/bin/bash' > "$$REAL_PATH"
                           echo 'exec "$$(dirname "$$0")/$$(basename "$$0").real" --no-sandbox "$$@"' >> "$$REAL_PATH"
                           chmod +x "$$REAL_PATH"
                       fi
                  fi
              done

              # CRITICAL FIX 4: The persistent /config directory contains corrupted XFCE session data from previous crashes!
              # This corrupted state forces xfce4-session to instantly core dump on every fresh boot. We must wipe it!
              rm -rf /config/.cache/sessions
              rm -rf /config/.dbus
              rm -f /config/.config/xfce4/xfconf/xfce-perchannel-xml/xfce4-session.xml

              # CRITICAL FIX 5: Prevent apt-get from restarting DBus during OBS installation, which kills the active desktop!
              echo "exit 101" > /usr/sbin/policy-rc.d
              chmod +x /usr/sbin/policy-rc.d

              # AGGRESSIVE DESKTOP FIX: Bypass xfce4-session entirely.
              # xfce4-session is fundamentally incompatible with this Ubuntu 24.04 Docker environment and core dumps.
              # We will manually launch the required components: window manager, desktop, and panel.
              cat << 'STARTWM' > /usr/local/bin/start-desktop.sh
              #!/bin/bash
              export GLYCIN_NO_SANDBOX=1
              xfsettingsd &
              xfwm4 &
              xfdesktop &
              xfce4-panel &

              sleep 2
              for f in /etc/xdg/autostart/*.desktop /config/.config/autostart/*.desktop; do
                  if [ -f "$$f" ]; then
                      EXEC_CMD=$$(grep "^Exec=" "$$f" | head -n 1 | cut -d "=" -f 2- | sed 's/%.//g')
                      if [ -n "$$EXEC_CMD" ]; then
                          bash -c "$$EXEC_CMD" &
                      fi
                  fi
              done
              wait
              STARTWM
              chmod +x /usr/local/bin/start-desktop.sh
              sed -i 's|.*xfce4-session.*|exec /usr/local/bin/start-desktop.sh|g' /defaults/startwm.sh
              sed -i 's|.*startxfce4.*|exec /usr/local/bin/start-desktop.sh|g' /defaults/startwm.sh

              # Start the desktop natively.
              exec /init
        security_opt:
            - seccomp:unconfined
            - apparmor:unconfined
        cap_add:
            - SYS_ADMIN
        environment:
            - GLYCIN_NO_SANDBOX=1
            - PUID=1000
            - PGID=1000
            - TZ=America/New_York
            - LIBGL_ALWAYS_SOFTWARE=1 # Required since Hyper-V VM has no GPU
            - MESA_GL_VERSION_OVERRIDE=3.3 # Force mesa to report OpenGL 3.3 support for OBS
            - CUSTOM_PORT=3005
            - CUSTOM_HTTPS_PORT=3006

            - QT_STYLE_OVERRIDE=Fusion # Fixes invisible checkboxes in KasmVNC
            - QT_QPA_PLATFORM=xcb
            - PIXELFLUX_WAYLAND=false # Forces X11 mode to fix missing UI checkboxes
            - QT_QUICK_BACKEND=software # CRITICAL: Forces Qt6 to use CPU instead of missing GPU for rendering SVG checkboxes!

        volumes:
            - ./config_ubuntu:/config
            - ./default_scenes.json:/default_scenes.json:ro
        network_mode: host
        restart: unless-stopped
